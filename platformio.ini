; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; -------------------------------------------------------
; Shared settings for all environments
; -------------------------------------------------------
[env_common]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags =
	-std=gnu99
	-std=c++17
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DCONFIG_ESP32_DISABLE_BROWNOUT_DETECTOR
	; --------- PIN DEFINITIONS ---------
	-DGPS_BAUD=115200
	-DGPS_DEFAULT_BAUD=115200
	-DTFT_BL=5
	-DBACKLIGHT_PWM_FREQ=5000
	-DBACKLIGHT_PWM_CHAN=0
	-DBACKLIGHT_PWM_RES=8
lib_deps =
	bitbank2/PNGdec@^1.1.0
	adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
	adafruit/Adafruit Unified Sensor@^1.1.15
	bblanchon/ArduinoJson@^7.4.1
	mikalhart/TinyGPSPlus@^1.1.0
	h2zero/NimBLE-Arduino@^1.4.2

; -------------------------------------------------------
; ESP32-WROVER-KIT (4MB flash, 8MB PSRAM)
; -------------------------------------------------------
[env:esp-wrover-kit]
platform = ${env_common.platform}
board = esp-wrover-kit
framework = ${env_common.framework}
monitor_speed = ${env_common.monitor_speed}
board_build.partitions = partitions_custom.csv
build_flags = ${env_common.build_flags}
	-DFLASH_SIZE_MB=4
	-DDISABLE_GPS
lib_deps = ${env_common.lib_deps}

; -------------------------------------------------------
; ESP32-WROVER-IPEX 16M 128Mbit (16MB flash, 8MB PSRAM)
; Part number: ESP32-WROVER-IPEX / XX0H28
; -------------------------------------------------------
[env:esp32-wrover-16mb]
platform = ${env_common.platform}
board = esp-wrover-kit
framework = ${env_common.framework}
monitor_speed = ${env_common.monitor_speed}
board_build.partitions = partitions_16mb.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.cmake_extra_args =
	-DCONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
build_flags = ${env_common.build_flags}
	-DFLASH_SIZE_MB=16
	-DBOARD_ESP32_WROVER_IPEX_16M=1
lib_deps = ${env_common.lib_deps}
